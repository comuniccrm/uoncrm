<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Marca CRM</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="stylesheet" href="styles/ds-agente.css">
    <link rel="stylesheet" href="styles/relatorios.css">
    <link rel="stylesheet" href="styles/conversas.css">
    <link rel="stylesheet" href="styles/dsvoice.css">
    <link rel="stylesheet" href="styles/automacoes.css">
    <link rel="stylesheet" href="styles/dstrack.css">
    <link rel="stylesheet" href="styles/pipeline.css">
    <link rel="stylesheet" href="styles/saas-admin.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Facebook SDK -->
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/pt_BR/sdk.js"></script>

    <!-- Supabase & Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        // Immediate auth check
        document.addEventListener('DOMContentLoaded', async () => {
            await requireAuth();
        });
    </script>
</head>

<body>
    <div class="app-window">
        <!-- System Topbar (the one with the dots and colors) -->
        <header class="system-topbar">
            <div class="topbar-right">
                <button class="theme-toggle" onclick="window.toggleTheme()" title="Alternar tema claro/escuro">
                    <i class="ph-light ph-moon"></i>
                </button>
            </div>
        </header>

        <!-- Main App Area -->
        <div class="app-body">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="brand-logo" id="main-brand-logo">
                    SUA <span class="brand-highlight">MARCA</span>
                </div>

                <nav class="sidebar-nav">
                    <a href="#inicio" class="nav-item active" data-view="inicio">
                        <i class="ph-light ph-house"></i>
                        <span>Início</span>
                    </a>
                    <a href="#relatorios" class="nav-item" data-view="relatorios">
                        <i class="ph-light ph-chart-bar"></i>
                        <span>Relatórios</span>
                    </a>
                    <a href="#conversas" class="nav-item" data-view="conversas">
                        <i class="ph-light ph-chat-text"></i>
                        <span>Conversas</span>
                    </a>
                    <a href="#ds-voice" class="nav-item" data-view="ds-voice">
                        <i class="ph-light ph-speaker-high"></i>
                        <span>DS Voice</span>
                    </a>

                    <div class="nav-group">
                        <div class="nav-group-header">
                            <i class="ph-light ph-briefcase"></i>
                            <span>CRM</span>
                            <i class="ph-light ph-caret-down group-toggle"></i>
                        </div>
                        <div class="nav-group-items expanded">
                            <a href="#negocios" class="sub-nav-item" data-view="negocios">Negócios</a>
                            <a href="#central-atividades" class="sub-nav-item" data-view="central-atividades">Central de
                                Atividades</a>
                            <a href="#ligacoes" class="sub-nav-item" data-view="ligacoes">Ligações</a>
                            <a href="#contatos" class="sub-nav-item" data-view="contatos">Contatos</a>
                        </div>
                    </div>

                    <div class="nav-group">
                        <div class="nav-group-header">
                            <i class="ph-light ph-target"></i>
                            <span>DS Track</span>
                            <i class="ph-light ph-caret-down group-toggle"></i>
                        </div>
                        <div class="nav-group-items expanded">
                            <a href="#dstrack-dashboard" class="sub-nav-item" data-view="dstrack-dashboard">Dashboard
                                Social</a>
                            <a href="#whatsapp-web" class="sub-nav-item" data-view="whatsapp-web">WhatsApp Web</a>
                            <a href="#dstrack-postagens" class="sub-nav-item"
                                data-view="dstrack-postagens">Postagens</a>
                            <a href="#dstrack-comentarios" class="sub-nav-item"
                                data-view="dstrack-comentarios">Comentários</a>
                            <a href="#dstrack-conexao" class="sub-nav-item" data-view="dstrack-conexao">Conexão API</a>
                        </div>
                    </div>

                    <div class="nav-group">
                        <div class="nav-group-header">
                            <i class="ph-light ph-folder"></i>
                            <span>Recursos</span>
                            <i class="ph-light ph-caret-right group-toggle"></i>
                        </div>
                    </div>

                    <div class="nav-group">
                        <div class="nav-group-header">
                            <i class="ph-light ph-lightning"></i>
                            <span>Automações</span>
                            <i class="ph-light ph-caret-down group-toggle"></i>
                        </div>
                        <div class="nav-group-items expanded">
                            <a href="#automacoes-fluxo" class="sub-nav-item" data-view="automacoes-fluxo">Construtor de
                                Fluxo</a>
                            <a href="#automacoes-conhecimento" class="sub-nav-item"
                                data-view="automacoes-conhecimento">Base de Conhecimento</a>
                            <a href="#automacoes-config" class="sub-nav-item" data-view="automacoes-config">Configuração
                                da IA</a>
                        </div>
                    </div>

                    <a href="#parceiros" class="nav-item badge-item" data-view="parceiros">
                        <div class="item-left">
                            <i class="ph-light ph-bookmark-simple"></i>
                            <span>Parceiros</span>
                        </div>
                        <span class="badge new">NOVO</span>
                    </a>

                    <!-- ADMIN SAAS: Only visible to platform owner usually -->
                    <div style="margin-top:24px; border-top:1px solid var(--border-color); padding-top:16px;">
                        <a href="#admin-saas" class="nav-item badge-item" data-view="admin-saas">
                            <div class="item-left">
                                <i class="ph-light ph-crown" style="color:#eab308"></i>
                                <span style="font-weight:600;">Painel SaaS</span>
                            </div>
                        </a>
                    </div>

                    <!-- User / Logout -->
                    <div style="margin-top: auto; border-top:1px solid var(--border-color); padding-top:16px;">
                        <a href="#" class="nav-item" onclick="signOut()">
                            <i class="ph-light ph-sign-out"></i>
                            <span>Sair</span>
                        </a>
                    </div>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content" id="main-content">
                <!-- Dynamic Content Will Be Rendered Here -->
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="scripts/contacts.js"></script>
    <script src="scripts/map.js"></script>
    <script src="scripts/app.js"></script>
</body>

</html>
